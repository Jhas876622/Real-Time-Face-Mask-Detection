services:
  - type: web
    name: real-time-face-mask-detection
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --max-requests 50 --max-requests-jitter 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0